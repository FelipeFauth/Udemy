<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            padding-bottom: 500px;
        }
    </style>
    <title>HTML fundamentos</title>
</head>

<body>
    <!-- 1 - títulos -->
    <h1>Título principal da página</h1>
    <h2>sub título</h2>

    <!-- 2 - parágrafos -->
    <p>Descrição dos nossos serviços</p>
    <p>Mais um parágrafo</p>

    <!-- 3 - tags sem conteúdo -->
    <p>Quebra <br/> de linha</p>
    <hr />
    <p>Quarto parágrafo</p>

    <!-- 4 - comentários -->

    <h2>Teste de comentários</h2>
    <!-- Ctrl mais dois pontos é um atalho para os comentários -->

    <!-- 5 - Atributos e Abrir link nova aba-->
    <a href="https://www.google.com/" target="_blank">Google</a>

    
</body>

</html>
