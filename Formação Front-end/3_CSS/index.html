<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS</title>
    <!--4 - External CSS-->
    <!--Cascading Style Sheets-->
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/lists.css">
    <!--3 - Internal CSS-->
    <style>
        p {
            color: gray;
            font-family: Arial, Helvetica, sans-serif;
            font-size: 40px;
        }
    </style>
    
</head>
<body>
    <!--1 - Inline CSS-->
    <h1 style="color: blue;">Mudar cor com o inline</h1>

    <!--2 - Multiplas regras-->
    <h1 style="color: red; font-size: 3em;">Multiplas regras</h1>

    <!--3 - Internal CSS-->
    <p>Eu fui estilizado pelo internal CSS</p>
    <p>Mais um</p>
    <p>E mais outro</p>

    <!--4 - External CSS -->
    <h3>Meu título verde</h3>

    <!--5 - Ordem do CSS-->
    <p style="color: red;">Ordem do CSS</p>
    <p>Ordem do CSS 2</p>

    <!--6 - Multiplos CSS-->
    <ul>
        <li>Maça</li>
        <li>Banana</li>
        <li>Abacate</li>
        <li>Abacaxi</li>
    </ul>
</body>
</html>
